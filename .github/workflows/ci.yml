name: CI

# Runs the unit + smoke suite behind the scoped fail_under=100 gate and the
# bandit security gate on every push and PR. Windows runner on purpose: the
# codebase has real Windows-specific behavior (PowerShell, cp1252 console, the
# NPU subprocess probe) so CI must exercise that platform.
#
# NOTE: this does NOT run pre-commit. The pre-commit `e2e-local` hook is
# LOCAL-ONLY (needs real Intel hardware) and must never run in CI, per
# .pre-commit-config.yaml. CI invokes pytest and bandit directly instead.

on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same ref makes the in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: tests + scoped 100% gate + bandit (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (+ Python 3.11)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      # core deps + the default `dev` group (pytest/cov/mock, bandit, ruff)
      # + the `mcp` extra so the mcp_servers import-smoke tests actually run
      # + the `celery` extra so cascade.celery_app (and its redis import) resolve
      #   in tests that import cascade.wiring / cascade.orchestrator.
      - name: Sync dependencies
        run: uv sync --extra mcp --extra celery

      # Same gate as the pre-commit bandit hook: our code only (deps live in
      # .venv, excluded via [tool.bandit] exclude_dirs). Loose by design -- a
      # LOCAL sandboxed runtime, so only egregious findings (HIGH severity AND
      # HIGH confidence) fail the build; everything else is reported, not gated.
      - name: Bandit security gate (egregious only -- high severity + confidence)
        run: uv run bandit -c pyproject.toml -r . --severity-level high --confidence-level high

      # addopts already carry --cov; [tool.coverage.report] fail_under = 100
      # makes this step (and the build) fail if the scoped 100% gate slips.
      - name: Unit + smoke tests (scoped 100% coverage gate)
        run: uv run pytest
